<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BhashaLipi AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
    <h2>🇮🇳 BhashaLipi AI</h2>
</nav>
<section class="hero">
    <h1>Bridging India's Language Gap</h1>
    <p>AI-powered multilingual script recognition & translation</p>
    <button onclick="scrollToUpload()">Try Now</button>
</section>


<section class="upload-section" id="upload">

    <div class="glass-card">
        <h2>Upload Script</h2>

        <input type="file" id="imageInput" accept="image/*">
        <button onclick="processImage()">Convert</button>

        <div id="loading" class="hidden loader"></div>

        <div id="result" class="hidden">
            <h3>📝 Extracted Text</h3>
            <p id="extractedText"></p>

            <h3>🌍 Translated Text</h3>
            <p id="translatedText"></p>

            <button onclick="playAudio()">🔊 Play Audio</button>
        </div>
    </div>

</section>

<script src="script.js"></script>
</body>
</html>
